<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seating Admin — Tristan & Regina</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="brand">Tristan <span>&</span> Regina — 2026</div>
  <div class="header-actions">
    <div class="stats" id="statsBar">Loading...</div>
    <button class="btn" id="missingBtn" onclick="toggleMissing()">Show Missing Guests</button>
    <button class="btn" onclick="showQRPanel()">QR Links</button>
    <button class="btn" onclick="resetAll()">Reset check-ins</button>
    <button class="btn primary" onclick="exportData()">Export list</button>
  </div>
</header>

<div class="layout">

  <!-- Ballroom canvas -->
  <div class="canvas-wrap" id="canvasWrap">
    <div class="ballroom-scaler" id="ballroomScaler">
      <div class="ballroom" id="ballroom">
      <img src="resources/Ballroom_Layout.png" class="ballroom-bg" alt="">
    </div><!-- /.ballroom -->
    </div><!-- /.ballroom-scaler -->
  </div><!-- /.canvas-wrap -->

  <div class="sidebar">
    <div class="sidebar-header">
      <h3 id="sidebarTitle">All Guests</h3>
      <p id="sidebarSub">Click a table to filter</p>
    </div>
    <div class="checkin-action-bar" id="checkinBar">
      <div class="action-label" id="checkinBarLabel">Check in 0 guests</div>
      <button class="action-cancel" onclick="clearPending()">Cancel</button>
      <button class="action-confirm" id="checkinBarConfirm" onclick="confirmCheckin()">Check in</button>
    </div>
    <div id="mixedAlert" class="mixed-alert"></div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder='Search name or "table 1"…' oninput="filterGuests()">
      <div id="adminAutocomplete" class="admin-autocomplete" style="display:none;"></div>
    </div>
    <div class="guest-list-header">
      <div class="col-label col-sel">Sel</div>
      <div class="col-label col-guest">Guest</div>
      <div class="col-label col-table">Table</div>
      <div class="col-label col-in">In</div>
    </div>
    <div class="guest-list" id="guestList"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--teal-fill)"></div> Regular</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--vip-fill)"></div> VIP</div>
      <div class="legend-item" style="color:var(--sage);font-weight:500;">✓ = checked in</div>
    </div>
  </div>

</div>

<script type="module">
const params = new URLSearchParams(window.location.search);
if (params.has('checkin')) {
  import('./checkin.js');
} else {
  import('./admin.js');
}
</script>
</body>
</html>
