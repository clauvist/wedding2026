<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seating Admin — Tristan & Regina</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sage: #7a8c78;
    --sage-light: #c8d4c6;
    --sage-pale: #eef2ed;
    --gold: #b8935a;
    --gold-light: #e8d5b0;
    --cream: #faf8f4;
    --charcoal: #2c2c2c;
    --muted: #7a7a7a;
    --vip-fill: #e8b84b;
    --teal-fill: #4db8a0;
    --empty-fill: #b8ccd4;
    --table-r: 32px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    background: white;
    border-bottom: 1px solid #e8e4de;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--charcoal);
  }

  .brand span { color: var(--gold); font-style: italic; }

  .header-actions { display: flex; gap: 8px; align-items: center; }

  .stats {
    font-size: 12px;
    color: var(--muted);
    padding: 6px 14px;
    background: var(--sage-pale);
    border-radius: 20px;
  }

  .stats strong { color: var(--charcoal); }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: 6px;
    border: 1px solid #ddd;
    background: white;
    cursor: pointer;
    color: var(--charcoal);
    transition: all 0.15s;
  }
  .btn:hover { background: var(--sage-pale); border-color: var(--sage); }
  .btn.primary { background: var(--sage); color: white; border-color: var(--sage); }
  .btn.primary:hover { background: #6a7c68; }

  .layout { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 57px); }

  /* Floor plan canvas */
  .canvas-wrap {
    flex: 1;
    overflow: auto;
    padding: 24px;
    background: #f0ede8;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  .ballroom-scaler {
    flex-shrink: 0;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  .ballroom {
    position: relative;
    background: white;
    border: 2px solid #c8c2b8;
    border-radius: 4px;
    width: 580px;
    height: 860px;
    flex-shrink: 0;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  /* Room label */
  .room-label {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* Stage */
  .stage {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 44px;
    background: #d4cfc8;
    border: 1.5px solid #b0aa9f;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: #6a6560;
  }

  /* AV label */
  .av-label {
    position: absolute;
    top: 148px;
    left: 8px;
    font-size: 10px;
    color: var(--muted);
    background: #e8e4de;
    border: 1px solid #ccc;
    padding: 2px 6px;
    border-radius: 3px;
  }

  /* Dance floor area */
  .dance-floor {
    position: absolute;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    width: 260px;
    height: 90px;
    border: 1.5px dashed #c8c2b8;
    border-radius: 4px;
  }

  .perimeter-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .table, .chair-ring, .stage, .av-label, .dance-floor, .room-label {
    z-index: 1;
  }

  /* Table circles */
  .table {
    position: absolute;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    transform: translate(-50%, -50%);
    border: 3px solid rgba(255,255,255,0.6);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  .table:hover { transform: translate(-50%, -50%) scale(1.08); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
  .table.selected { box-shadow: 0 0 0 3px var(--gold), 0 4px 16px rgba(0,0,0,0.2); transform: translate(-50%, -50%) scale(1.08); }

  .table.teal { background: var(--teal-fill); }
  .table.vip { background: var(--vip-fill); }
  .table.empty { background: var(--empty-fill); }

  .table-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 500;
    color: white;
    text-align: center;
    line-height: 1.1;
    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    pointer-events: none;
  }

  /* Chair dots around table */
  .chair-ring {
    position: absolute;
    width: 88px;
    height: 88px;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
  }

  /* Sidebar */
  .sidebar {
    width: 320px;
    flex-shrink: 0;
    background: white;
    border-left: 1px solid #e8e4de;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid #f0ede8;
    background: var(--sage-pale);
  }

  .sidebar-header h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--charcoal);
  }

  .sidebar-header p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .guest-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 0;
  }

  .guest-item {
    display: flex;
    align-items: center;
    padding: 8px 20px;
    gap: 10px;
    transition: background 0.1s;
    cursor: default;
  }

  .guest-item:hover { background: var(--sage-pale); }

  .guest-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--sage-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 500;
    color: var(--sage);
    flex-shrink: 0;
  }

  .guest-avatar.vip { background: var(--gold-light); color: var(--gold); }

  .guest-name {
    font-size: 13px;
    color: var(--charcoal);
    flex: 1;
  }

  .guest-seat {
    font-size: 11px;
    color: var(--muted);
  }

  .checkin-cell {
    width: 32px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 4px;
    height: 28px;
    transition: background 0.15s;
  }
  .checkin-cell:hover { background: var(--sage-pale); }
  .checkin-cell.arrived { color: var(--sage); }
  .checkin-cell svg { display: none; }
  .checkin-cell.arrived svg { display: block; }

  .guest-item { cursor: pointer; }
  .guest-item:hover .checkin-cell:not(.arrived) { background: #f0ede8; }

  .select-box {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 1.5px solid #d0cbc4;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    background: white;
  }
  .select-box:hover { border-color: var(--sage); }
  .select-box.pending { background: var(--sage); border-color: var(--sage); }
  .select-box.pending-arrived { background: var(--coral, #c0392b); border-color: var(--coral, #c0392b); }
  .select-box.pending svg { display: block; }
  .select-box.pending-arrived svg { display: block; }
  .select-box svg { display: none; width: 10px; height: 10px; }

  .checkin-action-bar {
    display: none;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--sage);
    gap: 10px;
    animation: slideDown 0.18s ease;
  }
  .checkin-action-bar.visible { display: flex; }
  .checkin-action-bar.mode-deregister { background: #c0392b; }
  .checkin-action-bar.mode-mixed { background: #888780; }
  @keyframes slideDown { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:none; } }

  .checkin-action-bar .action-label {
    font-size: 13px;
    font-weight: 500;
    color: white;
    flex: 1;
  }
  .checkin-action-bar .action-cancel {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    font-family: 'DM Sans', sans-serif;
  }
  .checkin-action-bar .action-cancel:hover { color: white; }
  .checkin-action-bar .action-confirm {
    font-size: 12px;
    font-weight: 500;
    color: var(--sage);
    background: white;
    border: none;
    border-radius: 6px;
    padding: 5px 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: opacity 0.15s;
  }
  .checkin-action-bar .action-confirm:hover { opacity: 0.88; }

  .flash-success {
    position: absolute;
    inset: 0;
    background: rgba(77,184,160,0.15);
    pointer-events: none;
    animation: flashFade 0.7s ease forwards;
    z-index: 10;
  }
  @keyframes flashFade { from { opacity:1; } to { opacity:0; } }

  .search-box {
    padding: 10px 16px;
    border-bottom: 1px solid #f0ede8;
  }

  .search-box input {
    width: 100%;
    padding: 7px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    border: 1px solid #e0dbd4;
    border-radius: 6px;
    background: var(--cream);
    color: var(--charcoal);
    outline: none;
  }
  .search-box input:focus { border-color: var(--sage); }
  .search-box input::placeholder { color: #bbb; }

  /* Legend */
  .legend {
    padding: 10px 20px;
    border-top: 1px solid #f0ede8;
    display: flex;
    gap: 16px;
    align-items: center;
    flex-shrink: 0;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--muted);
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }

  .no-results {
    text-align: center;
    padding: 30px 20px;
    color: var(--muted);
    font-size: 13px;
  }

  .table-section-label {
    padding: 6px 20px 2px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    background: #faf9f7;
    border-bottom: 1px solid #f0ede8;
    margin-top: 4px;
  }

  .table-ratio {
    position: absolute;
    bottom: -22px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: var(--gold);
    background: white;
    border: 1px solid var(--gold-light);
    border-radius: 10px;
    padding: 1px 8px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .table.selected .table-ratio { opacity: 1; }

  .btn.active {
    background: var(--charcoal);
    color: white;
    border-color: var(--charcoal);
  }
  .btn.active:hover { background: #444; }
</style>
</head>
<body>

<header>
  <div class="brand">Tristan <span>&</span> Regina — 2026</div>
  <div class="header-actions">
    <div class="stats" id="statsBar">Loading...</div>
    <button class="btn" id="missingBtn" onclick="toggleMissing()">Show Missing Guests</button>
    <button class="btn" onclick="showQRPanel()">QR Links</button>
    <button class="btn" onclick="resetAll()">Reset check-ins</button>
    <button class="btn primary" onclick="exportData()">Export list</button>
  </div>
</header>

<div class="layout">

  <!-- Ballroom canvas -->
  <div class="canvas-wrap" id="canvasWrap">
    <div class="ballroom-scaler" id="ballroomScaler">
      <div class="ballroom" id="ballroom">
      <div class="room-label">Grand Ballroom</div>
      <div class="av-label">AV</div>
      <div class="stage">STAGE</div>
      <div class="dance-floor"></div>

      <!-- Perimeter SVG: columns, pilasters, doors traced from uploaded floor plan -->
      <svg class="perimeter-svg" viewBox="0 0 580 860" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <style>
            .perim { fill: none; stroke: #9a958e; stroke-width: 1.2; }
            .perim-fill { fill: #e8e4de; stroke: #9a958e; stroke-width: 1; }
            .perim-dark { fill: #c8c2b8; stroke: #9a958e; stroke-width: 1; }
          </style>
        </defs>

        <!-- ═══ TOP SECTION ═══ -->
        <!-- Top foyer notch top-left (L-shaped room cutout) -->
        <path class="perim-fill" d="M8,9 L163,9 L163,78 L51,78 L51,122 L8,122 Z"/>
        <!-- Top-right room notch -->
        <path class="perim-fill" d="M414,9 L568,9 L568,78 L414,78 Z"/>
        <!-- Vertical lines top-right (hatching = wall/column detail) -->
        <line class="perim" x1="525" y1="9" x2="525" y2="78"/>
        <line class="perim" x1="540" y1="9" x2="540" y2="78"/>
        <line class="perim" x1="555" y1="9" x2="555" y2="78"/>
        <!-- Top corridor connecting strip -->
        <rect class="perim-fill" x="163" y="9" width="251" height="18"/>
        <!-- Small vent/box top centre -->
        <rect class="perim-dark" x="271" y="4" width="38" height="10" rx="1"/>

        <!-- Main outer wall top -->
        <rect class="perim-fill" x="8" y="78" width="564" height="44"/>

        <!-- ═══ LEFT WALL SCALLOPS ═══ -->
        <!-- Each scallop: semicircle bulge into the room, centred on left wall x≈8, peak at x≈48 -->
        <!-- Scallop centres at ballroom_y: 152, 242, 332, 422, 522, 612, 702, 792 -->
        <!-- (spaced ~90px apart, matching the pixel data) -->
        <g class="perim-fill">
          <!-- Left wall baseline strip -->
          <rect x="0" y="122" width="16" height="700"/>
          <!-- Scallop 1 -->
          <path d="M16,117 Q48,152 16,187 Z"/>
          <!-- Scallop 2 -->
          <path d="M16,207 Q48,242 16,277 Z"/>
          <!-- Scallop 3 -->
          <path d="M16,297 Q48,332 16,367 Z"/>
          <!-- Scallop 4 -->
          <path d="M16,387 Q48,422 16,457 Z"/>
          <!-- Scallop 5 -->
          <path d="M16,477 Q48,512 16,547 Z"/>
          <!-- Scallop 6 -->
          <path d="M16,567 Q48,602 16,637 Z"/>
          <!-- Scallop 7 -->
          <path d="M16,657 Q48,692 16,727 Z"/>
          <!-- Scallop 8 -->
          <path d="M16,747 Q48,782 16,817 Z"/>
        </g>
        <!-- Left wall outline strokes -->
        <line class="perim" x1="16" y1="122" x2="16" y2="822"/>
        <path class="perim" d="M16,117 Q48,152 16,187"/>
        <path class="perim" d="M16,207 Q48,242 16,277"/>
        <path class="perim" d="M16,297 Q48,332 16,367"/>
        <path class="perim" d="M16,387 Q48,422 16,457"/>
        <path class="perim" d="M16,477 Q48,512 16,547"/>
        <path class="perim" d="M16,567 Q48,602 16,637"/>
        <path class="perim" d="M16,657 Q48,692 16,727"/>
        <path class="perim" d="M16,747 Q48,782 16,817"/>

        <!-- ═══ RIGHT WALL SCALLOPS ═══ -->
        <!-- Right wall at x≈564, scallop peaks at x≈528 -->
        <g class="perim-fill">
          <rect x="564" y="122" width="16" height="700"/>
          <path d="M564,117 Q532,152 564,187 Z"/>
          <path d="M564,207 Q532,242 564,277 Z"/>
          <path d="M564,297 Q532,332 564,367 Z"/>
          <path d="M564,387 Q532,422 564,457 Z"/>
          <path d="M564,477 Q532,512 564,547 Z"/>
          <path d="M564,567 Q532,602 564,637 Z"/>
          <path d="M564,657 Q532,692 564,727 Z"/>
          <path d="M564,747 Q532,782 564,817 Z"/>
        </g>
        <line class="perim" x1="564" y1="122" x2="564" y2="822"/>
        <path class="perim" d="M564,117 Q532,152 564,187"/>
        <path class="perim" d="M564,207 Q532,242 564,277"/>
        <path class="perim" d="M564,297 Q532,332 564,367"/>
        <path class="perim" d="M564,387 Q532,422 564,457"/>
        <path class="perim" d="M564,477 Q532,512 564,547"/>
        <path class="perim" d="M564,567 Q532,602 564,637"/>
        <path class="perim" d="M564,657 Q532,692 564,727"/>
        <path class="perim" d="M564,747 Q532,782 564,817"/>

        <!-- ═══ BOTTOM WALL ═══ -->
        <!-- Bottom wall strip -->
        <rect class="perim-fill" x="8" y="822" width="564" height="22"/>
        <!-- Two arched door protrusions at bottom centre -->
        <!-- Left arch: centred ~x=265, Right arch: centred ~x=315 -->
        <path class="perim-fill" d="M222,822 Q222,848 265,848 Q308,848 308,822 Z"/>
        <path class="perim-fill" d="M272,822 Q272,848 315,848 Q358,848 358,822 Z"/>
        <!-- Arch outlines -->
        <path class="perim" d="M222,822 Q222,848 265,848 Q308,848 308,822"/>
        <path class="perim" d="M272,822 Q272,848 315,848 Q358,848 358,822"/>

        <!-- Bottom corners (slight cutoffs matching the image) -->
        <rect class="perim-fill" x="0" y="766" width="8" height="78"/>
        <rect class="perim-fill" x="572" y="766" width="8" height="78"/>

        <!-- ═══ OUTER WALL BORDER ═══ -->
        <!-- The main room outline (drawn last, on top) -->
        <rect x="8" y="78" width="556" height="12" fill="#c8c2b8" stroke="none"/>
        <rect x="8" y="822" width="556" height="12" fill="#c8c2b8" stroke="none"/>
        <!-- AV panel left wall marker -->
        <rect class="perim-dark" x="8" y="140" width="6" height="20" rx="1"/>
      </svg>
    </div><!-- /.ballroom -->
    </div><!-- /.ballroom-scaler -->
  </div><!-- /.canvas-wrap -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h3 id="sidebarTitle">All Guests</h3>
      <p id="sidebarSub">Click a table to filter</p>
    </div>
    <div class="checkin-action-bar" id="checkinBar">
      <div class="action-label" id="checkinBarLabel">Check in 0 guests</div>
      <button class="action-cancel" onclick="clearPending()">Cancel</button>
      <button class="action-confirm" id="checkinBarConfirm" onclick="confirmCheckin()">Check in</button>
    </div>
    <div id="mixedAlert" style="display:none;padding:10px 16px;background:#f5f3f0;border-bottom:1px solid #e8e4de;font-size:12px;color:#5f5e5a;line-height:1.6;"></div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder='Search name or "table 1"…' oninput="filterGuests()">
    </div>
    <div style="display:flex;align-items:center;padding:5px 20px 5px;border-bottom:1px solid #f0ede8;background:#faf9f7;">
      <div style="width:18px;flex-shrink:0;font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);">Sel</div>
      <div style="flex:1;font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);padding-left:10px;margin-left:12px;">Guest</div>
      <div style="font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-right:4px;">Table</div>
      <div style="width:32px;text-align:center;font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);">In</div>
    </div>
    <div class="guest-list" id="guestList"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--teal-fill)"></div> Regular</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--vip-fill)"></div> VIP</div>
      <div class="legend-item" style="color:var(--sage);font-weight:500;">✓ = checked in</div>
    </div>
  </div>
</div>

<script>
const guestData = [

  guestsByTable[g.table].push(g);

function initBallroom() {
  const ballroom = document.getElementById('ballroom');
  tables.forEach(t => {
    const guests = guestsByTable[t.id] || [];
    const type = guests.length === 0 ? 'empty' : t.type;

    // Chair ring (decorative dots)
    const ring = document.createElement('div');
    ring.className = 'chair-ring';
    ring.style.left = t.cx + 'px';
    ring.style.top = t.cy + 'px';

    const numChairs = Math.max(8, guests.length);
    for (let i = 0; i < numChairs; i++) {
      const angle = (i / numChairs) * 2 * Math.PI - Math.PI / 2;
      const r = 38;
      const dot = document.createElement('div');
      dot.style.cssText = `
        position:absolute;
        width:8px;height:8px;border-radius:50%;
        background:${type === 'vip' ? '#d4a83a' : type === 'empty' ? '#a0b4bc' : '#3a9a86'};
        opacity:0.5;
        left:${44 + r * Math.cos(angle) - 4}px;
        top:${44 + r * Math.sin(angle) - 4}px;
      `;
      ring.appendChild(dot);
    }
    ballroom.appendChild(ring);

    // Table circle
    const el = document.createElement('div');
    el.className = `table ${type}`;
    el.style.left = t.cx + 'px';
    el.style.top = t.cy + 'px';
    el.dataset.tableId = t.id;
    el.onclick = () => selectTable(t.id);

    const label = document.createElement('div');
    label.className = 'table-label';
    label.innerHTML = t.id === 'VIP 1' ? 'VIP<br>1' : t.id;
    el.appendChild(label);

    const ratio = document.createElement('div');
    ratio.className = 'table-ratio';
    ratio.dataset.ratioFor = t.id;
    el.appendChild(ratio);

    ballroom.appendChild(el);
  });
}

function toggleMissing() {
  showMissingOnly = !showMissingOnly;
  const btn = document.getElementById('missingBtn');
  btn.textContent = showMissingOnly ? 'Show All Guests' : 'Show Missing Guests';
  btn.classList.toggle('active', showMissingOnly);

  // Clear table/search filter when toggling missing mode
  selectedTable = null;
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.table').forEach(el => el.classList.remove('selected'));

  const title = document.getElementById('sidebarTitle');
  const sub = document.getElementById('sidebarSub');
  if (showMissingOnly) {
    const missing = guestData.filter(g => !arrivedGuests.has(g.table + '|' + g.name));
    title.textContent = 'Missing Guests';
    sub.textContent = `${missing.length} not yet checked in`;
  } else {
    title.textContent = 'All Guests';
    sub.textContent = 'Click a table to filter';
  }
  renderGuests();
}

function updateTableRatio(tableId) {
  const el = document.querySelector(`[data-ratio-for="${CSS.escape(tableId)}"]`);
  if (!el) return;
  const guests = guestsByTable[tableId] || [];
  const arrived = guests.filter(g => arrivedGuests.has(g.table + '|' + g.name)).length;
  el.textContent = `${arrived} / ${guests.length}`;
}

function selectTable(tableId) {
  if (showMissingOnly) {
    showMissingOnly = false;
    const btn = document.getElementById('missingBtn');
    btn.textContent = 'Show Missing Guests';
    btn.classList.remove('active');
  }

  const searchInput = document.getElementById('searchInput');

  // Clicking the already-selected table deselects (clear filter)
  if (selectedTable === tableId) {
    selectedTable = null;
    document.querySelectorAll('.table').forEach(el => el.classList.remove('selected'));
    searchInput.value = '';
    document.getElementById('sidebarTitle').textContent = 'All Guests';
    document.getElementById('sidebarSub').textContent = 'Click a table to filter';
    renderGuests();
    return;
  }

  // Route through filterGuests — identical to typing "Table X" in the search bar
  searchInput.value = `Table ${tableId}`;
  filterGuests();
}

function filterGuests() {
  selectedTable = null;
  document.querySelectorAll('.table').forEach(el => el.classList.remove('selected'));

  // Reset missing mode when user types
  if (showMissingOnly) {
    showMissingOnly = false;
    const btn = document.getElementById('missingBtn');
    btn.textContent = 'Show Missing Guests';
    btn.classList.remove('active');
  }

  const q = document.getElementById('searchInput').value.trim();
  const title = document.getElementById('sidebarTitle');
  const sub = document.getElementById('sidebarSub');

  // Detect "table X" or "table VIP 1" pattern
  const tableMatch = q.match(/^table\s+(.+)$/i);
  if (tableMatch) {
    const tq = tableMatch[1].trim().toUpperCase();
    const allIds = [...new Set(guestData.map(g => g.table))];
    const matchedId = allIds.find(id => id.toUpperCase() === tq || id.toUpperCase() === tq.replace('VIP1','VIP 1'));
    if (matchedId) {
      document.querySelectorAll('.table').forEach(el => {
        el.classList.toggle('selected', el.dataset.tableId === matchedId);
      });
      selectedTable = matchedId;
      updateTableRatio(matchedId);
      const count = guestData.filter(g => g.table === matchedId).length;
      const arrivedCount = guestData.filter(g => g.table === matchedId && arrivedGuests.has(g.table + '|' + g.name)).length;
      title.textContent = `Table ${matchedId}`;
      sub.textContent = `${count} guests · ${arrivedCount} checked in`;
    } else {
      title.textContent = 'No table found';
      sub.textContent = `"${q}"`;
    }
  } else if (q) {
    const matches = guestData.filter(g => g.name.toLowerCase().includes(q.toLowerCase()));
    title.textContent = 'Search results';
    sub.textContent = `${matches.length} guest${matches.length !== 1 ? 's' : ''} found`;
  } else {
    title.textContent = 'All Guests';
    sub.textContent = 'Click a table to filter';
  }
  renderGuests();
}

function renderGuests() {
  const list = document.getElementById('guestList');
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let toShow = guestData;

  const tableMatch = q.match(/^table\s+(.+)$/i);
  if (selectedTable) {
    toShow = guestData.filter(g => g.table === selectedTable);
  } else if (tableMatch) {
    const tq = tableMatch[1].trim().toUpperCase();
    const allIds = [...new Set(guestData.map(g => g.table))];
    const matchedId = allIds.find(id => id.toUpperCase() === tq);
    toShow = matchedId ? guestData.filter(g => g.table === matchedId) : [];
  } else if (q) {
    toShow = guestData.filter(g => g.name.toLowerCase().includes(q));
  }

  // Apply missing-only filter on top of any existing filter
  if (showMissingOnly) {
    toShow = toShow.filter(g => !arrivedGuests.has(g.table + '|' + g.name));
  }

  if (toShow.length === 0) {
    list.innerHTML = '<div class="no-results">' + (showMissingOnly ? 'Everyone has checked in!' : 'No guests found') + '</div>';
    updateStats();
    return;
  }

  // Group by table when showing all guests (no filter active) or missing-only
  const showingAll = !selectedTable && !q;
  if (showingAll || showMissingOnly) {
    const byTable = {};
    toShow.forEach(g => {
      if (!byTable[g.table]) byTable[g.table] = [];
      byTable[g.table].push(g);
    });
    const sortedTables = Object.keys(byTable).sort((a, b) => {
      if (a === 'VIP 1') return -1;
      if (b === 'VIP 1') return 1;
      return parseInt(a) - parseInt(b);
    });
    list.innerHTML = '';
    sortedTables.forEach(tbl => {
      const allInTable = guestData.filter(g => g.table === tbl);
      const arrivedCount = allInTable.filter(g => arrivedGuests.has(g.table + '|' + g.name)).length;
      const sec = document.createElement('div');
      sec.className = 'table-section-label';
      sec.textContent = showMissingOnly
        ? `Table ${tbl} · ${byTable[tbl].length} missing`
        : `Table ${tbl} · ${allInTable.length} guests · ${arrivedCount} checked in`;
      list.appendChild(sec);
      byTable[tbl].forEach(g => list.appendChild(makeGuestItem(g)));
    });
  } else {
    list.innerHTML = '';
    toShow.forEach(g => list.appendChild(makeGuestItem(g)));
  }

  updateStats();
}

function makeGuestItem(g) {
  const key = g.table + '|' + g.name;
  const isVip = g.table === 'VIP 1';
  const arrived = arrivedGuests.has(key);
  const pending = pendingCheckins.has(key);

  const item = document.createElement('div');
  item.className = 'guest-item' + (arrived ? ' already-in' : '');

  const initials = g.name.split(' ').filter(Boolean).slice(0,2).map(w => w[0].toUpperCase()).join('');

  // Select box class: pending-arrived for checked-in guests, pending for unchecked
  const boxClass = pending ? (arrived ? 'pending-arrived' : 'pending') : '';
  const boxTitle = arrived
    ? (pending ? 'Remove from de-register selection' : 'Select to de-register')
    : (pending ? 'Remove from selection' : 'Select to check in');

  item.innerHTML = `
    <div class="select-box ${boxClass}" data-key="${key}" title="${boxTitle}">
      <svg viewBox="0 0 10 10" fill="none"><path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="guest-avatar ${isVip ? 'vip' : ''}" style="margin-left:12px;">${initials}</div>
    <div class="guest-name">${g.name}</div>
    <div class="guest-seat">T${g.table}</div>
    <div class="checkin-cell ${arrived ? 'arrived' : ''}" data-key="${key}" title="${arrived ? 'Click to undo check-in' : 'Click to check in'}">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 8.5L6.5 12L13 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  `;

  // Select checkbox — works for ALL guests now
  item.querySelector('.select-box').addEventListener('click', (e) => {
    e.stopPropagation();
    togglePending(key);
  });

  // Direct check-in tick (existing behaviour)
  item.querySelector('.checkin-cell').addEventListener('click', (e) => {
    e.stopPropagation();
    const k = e.currentTarget.dataset.key;
    if (arrivedGuests.has(k)) arrivedGuests.delete(k);
    else { arrivedGuests.add(k); pendingCheckins.delete(k); }
    if (selectedTable === g.table) updateTableRatio(g.table);
    updateActionBar();
    renderGuests();
  });

  return item;
}

function togglePending(key) {
  if (pendingCheckins.has(key)) pendingCheckins.delete(key);
  else pendingCheckins.add(key);
  updateActionBar();
  // Update just the checkbox state without a full re-render
  const arrived = arrivedGuests.has(key);
  const isPending = pendingCheckins.has(key);
  document.querySelectorAll(`.select-box[data-key="${CSS.escape(key)}"]`).forEach(el => {
    el.classList.toggle('pending', isPending && !arrived);
    el.classList.toggle('pending-arrived', isPending && arrived);
  });
}

function updateActionBar() {
  const bar = document.getElementById('checkinBar');
  const label = document.getElementById('checkinBarLabel');
  const confirmBtn = document.getElementById('checkinBarConfirm');
  const alert = document.getElementById('mixedAlert');
  const n = pendingCheckins.size;

  if (n === 0) {
    bar.classList.remove('visible', 'mode-deregister', 'mode-mixed');
    alert.style.display = 'none';
    return;
  }

  bar.classList.add('visible');

  const checkedIn   = [...pendingCheckins].filter(k => arrivedGuests.has(k));
  const notCheckedIn = [...pendingCheckins].filter(k => !arrivedGuests.has(k));
  const allArrived  = checkedIn.length === n;
  const allPending  = notCheckedIn.length === n;
  const mixed       = checkedIn.length > 0 && notCheckedIn.length > 0;

  const nameOf = key => key.split('|')[1];

  if (allPending) {
    // Normal check-in mode
    bar.classList.remove('mode-deregister', 'mode-mixed');
    label.textContent = `Check in ${n} guest${n !== 1 ? 's' : ''}`;
    confirmBtn.textContent = 'Check in';
    confirmBtn.style.opacity = '1';
    confirmBtn.style.pointerEvents = 'auto';
    alert.style.display = 'none';

  } else if (allArrived) {
    // De-register mode
    bar.classList.add('mode-deregister');
    bar.classList.remove('mode-mixed');
    label.textContent = `De-register ${n} guest${n !== 1 ? 's' : ''}`;
    confirmBtn.textContent = 'De-register';
    confirmBtn.style.opacity = '1';
    confirmBtn.style.pointerEvents = 'auto';
    alert.style.display = 'none';

  } else {
    // Mixed — grey out, show alert
    bar.classList.add('mode-mixed');
    bar.classList.remove('mode-deregister');
    label.textContent = 'Cannot action mixed selection';
    confirmBtn.textContent = 'Action';
    confirmBtn.style.opacity = '0.35';
    confirmBtn.style.pointerEvents = 'none';

    const checkedNames  = checkedIn.map(nameOf);
    const pendingNames  = notCheckedIn.map(nameOf);
    alert.style.display = 'block';
    alert.innerHTML =
      `<strong style="color:#2c2c2c;">Checked in:</strong> ${checkedNames.join(', ')}<br>` +
      `<strong style="color:#2c2c2c;">Not checked in:</strong> ${pendingNames.join(', ')}<br>` +
      `<span style="color:#c0392b;font-weight:500;">No action can be taken on a mixed selection.</span>`;
  }
}

function clearPending() {
  pendingCheckins.clear();
  updateActionBar();
  renderGuests();
}

function confirmCheckin() {
  if (pendingCheckins.size === 0) return;

  const checkedIn    = [...pendingCheckins].filter(k => arrivedGuests.has(k));
  const notCheckedIn = [...pendingCheckins].filter(k => !arrivedGuests.has(k));
  const mixed        = checkedIn.length > 0 && notCheckedIn.length > 0;
  if (mixed) return; // button is disabled, but guard anyway

  if (checkedIn.length > 0 && notCheckedIn.length === 0) {
    // De-register all selected
    checkedIn.forEach(key => arrivedGuests.delete(key));
  } else {
    // Check in all selected
    notCheckedIn.forEach(key => { arrivedGuests.add(key); });
  }

  pendingCheckins.clear();
  if (selectedTable) updateTableRatio(selectedTable);
  updateActionBar();
  renderGuests();

  // Flash
  const list = document.getElementById('guestList');
  const flash = document.createElement('div');
  flash.className = 'flash-success';
  list.style.position = 'relative';
  list.appendChild(flash);
  flash.addEventListener('animationend', () => flash.remove());

  updateStats();
  if (selectedTable) {
    const guests = guestsByTable[selectedTable] || [];
    const arrivedCount = guests.filter(g => arrivedGuests.has(g.table + '|' + g.name)).length;
    document.getElementById('sidebarSub').textContent = `${guests.length} guests · ${arrivedCount} checked in`;
  }
}

function updateStats() {
  const total = guestData.length;
  const arrived = arrivedGuests.size;
  document.getElementById('statsBar').innerHTML =
    `<strong>${arrived}</strong> / ${total} arrived`;
}

function resetAll() {
  if (confirm('Reset all check-ins?')) {
    arrivedGuests.clear();
    pendingCheckins.clear();
    showMissingOnly = false;
    const btn = document.getElementById('missingBtn');
    if (btn) { btn.textContent = 'Show Missing Guests'; btn.classList.remove('active'); }
    updateActionBar();
    renderGuests();
  }
}

function exportData() {
  const rows = ['Table,Guest,Status'];
  const sorted = [...guestData].sort((a,b) => {
    if (a.table === 'VIP 1') return -1;
    if (b.table === 'VIP 1') return 1;
    return parseInt(a.table) - parseInt(b.table);
  });
  sorted.forEach(g => {
    const key = g.table + '|' + g.name;
    rows.push(`"${g.table}","${g.name}","${arrivedGuests.has(key) ? 'Arrived' : 'Not arrived'}"`);
  });
  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'seating-checkin.csv';
  a.click();
}

function scaleBallroom() {
  const wrap = document.getElementById('canvasWrap');
  const scaler = document.getElementById('ballroomScaler');
  const ballroom = document.getElementById('ballroom');
  if (!wrap || !scaler || !ballroom) return;

  const BALLROOM_W = 580;
  const BALLROOM_H = 860;
  const PAD = 48; // 24px each side

  const availW = wrap.clientWidth - PAD;
  const availH = wrap.clientHeight - PAD;

  const scaleW = availW / BALLROOM_W;
  const scaleH = availH / BALLROOM_H;
  const scale = Math.min(scaleW, scaleH, 1); // never scale up, only down

  ballroom.style.transformOrigin = 'top center';
  ballroom.style.transform = `scale(${scale})`;

  // Shrink scaler to the scaled footprint so canvas-wrap doesn't scroll
  scaler.style.width = Math.round(BALLROOM_W * scale) + 'px';
  scaler.style.height = Math.round(BALLROOM_H * scale) + 'px';
  scaler.style.overflow = 'visible';
}

scaleBallroom();
window.addEventListener('resize', scaleBallroom);

// ─── TEST HARNESS ────────────────────────────────────────────────────────────
function runTest() {
  // 1. Pick 100 random guests
  const shuffled = [...guestData].sort(() => Math.random() - 0.5);
  const chosen100 = shuffled.slice(0, 100);

  // 2. Check them all in
  arrivedGuests.clear();
  chosen100.forEach(g => arrivedGuests.add(g.table + '|' + g.name));

  // Reset UI
  selectedTable = null;
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.table').forEach(el => el.classList.remove('selected'));
  renderGuests();

  const results = [];
  let allPassed = true;

  // TEST 1: Header stat counter
  const statText = document.getElementById('statsBar').textContent;
  const statMatch = statText.match(/(\d+)\s*\/\s*(\d+)/);
  const t1Pass = statMatch && parseInt(statMatch[1]) === 100 && parseInt(statMatch[2]) === guestData.length;
  results.push({ label: 'Header stat shows 100 / ' + guestData.length, pass: t1Pass, detail: 'Got: "' + statText.trim() + '"' });
  if (!t1Pass) allPassed = false;

  // TEST 2: All-guest view tick count
  const allItems = document.querySelectorAll('#guestList .guest-item');
  const arrivedItems = [...allItems].filter(el => el.querySelector('.checkin-cell.arrived'));
  const t2Pass = arrivedItems.length === 100;
  results.push({ label: 'All-guest view: 100 rows show ✓ tick', pass: t2Pass, detail: 'Ticked rows visible: ' + arrivedItems.length });
  if (!t2Pass) allPassed = false;

  // TEST 3: Not-arrived guests show no tick
  const notArrivedItems = [...allItems].filter(el => !el.querySelector('.checkin-cell.arrived'));
  const expectedNotArrived = guestData.length - 100;
  const t3Pass = notArrivedItems.length === expectedNotArrived;
  results.push({ label: 'All-guest view: ' + expectedNotArrived + ' rows have no tick', pass: t3Pass, detail: 'Unticked rows: ' + notArrivedItems.length });
  if (!t3Pass) allPassed = false;

  // TEST 4: Name filter — checked-in guest shows tick
  const checkedInGuest = chosen100[0];
  document.getElementById('searchInput').value = checkedInGuest.name.split(' ')[0];
  filterGuests();
  const nameFilterItems = document.querySelectorAll('#guestList .guest-item');
  const nameFilterArrived = [...nameFilterItems].filter(el => {
    const nameEl = el.querySelector('.guest-name');
    return nameEl && nameEl.textContent === checkedInGuest.name && el.querySelector('.checkin-cell.arrived');
  });
  const t4Pass = nameFilterArrived.length >= 1;
  results.push({ label: 'Name filter "' + checkedInGuest.name.split(' ')[0] + '": checked-in guest shows ✓', pass: t4Pass, detail: 'Matched checked-in rows: ' + nameFilterArrived.length });
  if (!t4Pass) allPassed = false;

  // TEST 5: Name filter — not-arrived guest shows no tick
  const notCheckedIn = guestData.find(g => !arrivedGuests.has(g.table + '|' + g.name));
  document.getElementById('searchInput').value = notCheckedIn.name;
  filterGuests();
  const ncItems = document.querySelectorAll('#guestList .guest-item');
  const ncArrived = [...ncItems].filter(el => el.querySelector('.checkin-cell.arrived'));
  const t5Pass = ncArrived.length === 0;
  results.push({ label: 'Name filter "' + notCheckedIn.name + '": not-arrived guest shows no tick', pass: t5Pass, detail: 'Unexpected ticked rows: ' + ncArrived.length });
  if (!t5Pass) allPassed = false;

  // TEST 6: Table filter — tick count matches expected
  const testTableId = checkedInGuest.table;
  document.getElementById('searchInput').value = 'Table ' + testTableId;
  filterGuests();
  const tableItems = document.querySelectorAll('#guestList .guest-item');
  const tableArrivedExpected = guestData.filter(g => g.table === testTableId && arrivedGuests.has(g.table + '|' + g.name)).length;
  const tableArrivedVisible = [...tableItems].filter(el => el.querySelector('.checkin-cell.arrived')).length;
  const t6Pass = tableArrivedVisible === tableArrivedExpected;
  results.push({ label: 'Table filter "Table ' + testTableId + '": ticks match (expected ' + tableArrivedExpected + ')', pass: t6Pass, detail: 'Visible ticks: ' + tableArrivedVisible });
  if (!t6Pass) allPassed = false;

  // TEST 7: Floor plan circle highlighted by table filter
  const highlighted = document.querySelectorAll('.table.selected');
  const t7Pass = highlighted.length === 1 && highlighted[0].dataset.tableId === testTableId;
  results.push({ label: 'Table filter: floor plan table ' + testTableId + ' highlighted', pass: t7Pass, detail: 'Selected tables: ' + ([...highlighted].map(e => e.dataset.tableId).join(', ') || 'none') });
  if (!t7Pass) allPassed = false;

  // TEST 8: Section headers show correct arrived counts
  document.getElementById('searchInput').value = '';
  selectedTable = null;
  document.querySelectorAll('.table').forEach(el => el.classList.remove('selected'));
  renderGuests();
  const sectionLabels = document.querySelectorAll('#guestList .table-section-label');
  let t8Pass = true, t8Detail = '';
  sectionLabels.forEach(sec => {
    const m = sec.textContent.match(/Table (.+?) ·.+· (\d+) checked in/);
    if (!m) return;
    const tbl = m[1].trim();
    const visibleCount = parseInt(m[2]);
    const actualCount = guestData.filter(g => g.table === tbl && arrivedGuests.has(g.table + '|' + g.name)).length;
    if (visibleCount !== actualCount) { t8Pass = false; t8Detail += 'Table ' + tbl + ': shown ' + visibleCount + ' vs actual ' + actualCount + '. '; }
  });
  if (!t8Detail) t8Detail = 'All section counts correct';
  results.push({ label: 'Section headers: checked-in counts accurate across all tables', pass: t8Pass, detail: t8Detail });
  if (!t8Pass) allPassed = false;

  // TEST 9: Toggle — uncheck a checked-in guest and verify tick disappears
  const toggleGuest = chosen100[5];
  const toggleKey = toggleGuest.table + '|' + toggleGuest.name;
  document.getElementById('searchInput').value = toggleGuest.name;
  filterGuests();
  const beforeToggle = document.querySelectorAll('#guestList .checkin-cell.arrived').length;
  arrivedGuests.delete(toggleKey);
  renderGuests();
  const afterToggle = document.querySelectorAll('#guestList .checkin-cell.arrived').length;
  const t9Pass = beforeToggle === 1 && afterToggle === 0;
  results.push({ label: 'Toggle: unchecking "' + toggleGuest.name + '" removes tick', pass: t9Pass, detail: 'Ticks before: ' + beforeToggle + ', after: ' + afterToggle });
  if (!t9Pass) allPassed = false;
  // Restore for clean state
  arrivedGuests.add(toggleKey);

  // TEST 10: Table filter shows section subtitle with check-in count
  const t2id = chosen100[2].table;
  document.getElementById('searchInput').value = 'Table ' + t2id;
  filterGuests();
  const subtitle = document.getElementById('sidebarSub').textContent;
  const t10Pass = subtitle.includes('checked in');
  results.push({ label: 'Table filter sidebar subtitle shows checked-in count', pass: t10Pass, detail: 'Subtitle: "' + subtitle + '"' });
  if (!t10Pass) allPassed = false;

  // Reset to clean all-guest view after test
  document.getElementById('searchInput').value = '';
  selectedTable = null;
  document.querySelectorAll('.table').forEach(el => el.classList.remove('selected'));
  renderGuests();

  // RENDER REPORT
  const existing = document.getElementById('test-report');
  if (existing) existing.remove();

  const checkedInNames = chosen100.map(g => g.name + ' (T' + g.table + ')');
  const passCount = results.filter(r => r.pass).length;

  const report = document.createElement('div');
  report.id = 'test-report';
  report.style.cssText = 'position:fixed;top:64px;right:340px;width:430px;max-height:calc(100vh - 80px);overflow-y:auto;background:white;border:1px solid #e0dbd4;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,0.14);font-family:DM Sans,sans-serif;font-size:13px;z-index:9999;';

  const headerColor = allPassed ? '#0f6e56' : '#a32d2d';
  const headerBg = allPassed ? '#e1f5ee' : '#fcebeb';

  report.innerHTML =
    '<div style="padding:14px 18px 10px;border-bottom:1px solid #f0ede8;display:flex;align-items:center;justify-content:space-between;">' +
      '<div>' +
        '<div style="font-family:Cormorant Garamond,serif;font-size:17px;font-weight:500;color:#2c2c2c;">Test Results</div>' +
        '<div style="font-size:11px;color:#7a7a7a;margin-top:2px;">100 random guests · ' + passCount + '/' + results.length + ' assertions passed</div>' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:8px;">' +
        '<div style="font-size:13px;font-weight:500;padding:3px 10px;border-radius:20px;background:' + headerBg + ';color:' + headerColor + ';">' + (allPassed ? 'ALL PASS' : 'FAILURES') + '</div>' +
        '<button onclick="document.getElementById(\'test-report\').remove()" style="border:none;background:none;cursor:pointer;font-size:20px;color:#bbb;line-height:1;padding:0 2px;">×</button>' +
      '</div>' +
    '</div>' +
    '<div style="padding:10px 18px;">' +
      results.map(function(r) {
        const ic = r.pass ? '#0f6e56' : '#a32d2d';
        const ib = r.pass ? '#e1f5ee' : '#fcebeb';
        const svg = r.pass
          ? '<path d="M3 8.5L6.5 12L13 5" stroke="#0f6e56" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'
          : '<path d="M4 4L12 12M12 4L4 12" stroke="#a32d2d" stroke-width="2.5" stroke-linecap="round"/>';
        return '<div style="display:flex;gap:9px;align-items:flex-start;padding:6px 0;border-bottom:1px solid #f8f6f3;">' +
          '<div style="width:18px;height:18px;border-radius:50%;background:' + ib + ';display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;">' +
            '<svg width="10" height="10" viewBox="0 0 16 16" fill="none">' + svg + '</svg>' +
          '</div>' +
          '<div>' +
            '<div style="color:#2c2c2c;line-height:1.4;">' + r.label + '</div>' +
            '<div style="color:#9a9a9a;font-size:11px;margin-top:1px;">' + r.detail + '</div>' +
          '</div>' +
        '</div>';
      }).join('') +
    '</div>' +
    '<div style="padding:10px 18px 14px;border-top:1px solid #f0ede8;">' +
      '<div style="font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:#7a7a7a;margin-bottom:6px;">Checked-in guests (' + chosen100.length + ')</div>' +
      '<div style="font-size:11px;color:#7a7a7a;line-height:1.8;">' + checkedInNames.join(' · ') + '</div>' +
    '</div>';

  document.body.appendChild(report);
}

// ─── GUEST CHECK-IN MODE ─────────────────────────────────────────────────────
(function() {
  const params = new URLSearchParams(window.location.search);
  if (!params.has('checkin')) return;

  // Hide admin UI completely
  document.querySelector('header').style.display = 'none';
  document.querySelector('.layout').style.display = 'none';
  document.body.style.overflow = 'auto';
  document.body.style.height = 'auto';
  document.body.style.background = '#faf8f4';

  // State
  let resolvedGuest = null; // { name, table }

  // Build overlay
  const overlay = document.createElement('div');
  overlay.id = 'guest-overlay';
  overlay.style.cssText = 'min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 0 48px;';
  document.body.appendChild(overlay);

  // ── Fuzzy match: Levenshtein distance ───────────────────────────────────────
  function levenshtein(a, b) {
    a = a.toLowerCase(); b = b.toLowerCase();
    const m = a.length, n = b.length;
    const dp = Array.from({length: m+1}, (_, i) => Array.from({length: n+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
    for (let i = 1; i <= m; i++)
      for (let j = 1; j <= n; j++)
        dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    return dp[m][n];
  }

  function findMatches(query) {
    const q = query.trim().toLowerCase();
    if (q.length < 2) return [];

    // Strip parenthetical suffixes from a word for cleaner matching
    const cleanWord = w => w.replace(/[(),.'"]/g, '');

    // Score: 0 if any word starts-with or contains query; else best Levenshtein vs individual words only
    const scored = guestData.map(g => {
      const words = g.name.toLowerCase().split(' ').map(cleanWord).filter(Boolean);
      let score;
      if (words.some(w => w.startsWith(q)))      score = 0;
      else if (words.some(w => w.includes(q)))   score = 0;
      else score = Math.min(...words.map(w => levenshtein(q, w)));
      return { g, score };
    });

    // Threshold: allow at most 1 edit (strict < 2), so score must be 0 or 1
    return scored
      .filter(({score}) => score < 2)
      .sort((a, b) => a.score - b.score)
      .slice(0, 6)
      .map(({g}) => g);
  }

  // ── Event header block (reused across screens) ───────────────────────────────
  const eventHeader = `
    <div style="text-align:center;padding:48px 0 28px;">
      <div style="font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:#b8935a;margin-bottom:10px;">Welcome to</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:400;color:#2c2c2c;line-height:1.2;">Tristan <span style="font-style:italic;color:#b8935a;">&amp;</span> Regina</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:13px;color:#7a7a7a;margin-top:6px;letter-spacing:0.04em;">Saturday, 2 May 2026</div>
    </div>`;

  // ── SCREEN 0: Name search ────────────────────────────────────────────────────
  function renderSearch(prefill) {
    overlay.innerHTML = `
      <div style="width:100%;max-width:420px;padding:0 20px;">
        ${eventHeader}
        <div style="background:white;border:1px solid #e8e4de;border-radius:16px;padding:24px;margin-bottom:16px;">
          <div style="font-size:13px;font-weight:500;color:#2c2c2c;margin-bottom:6px;">Your name</div>
          <div style="font-size:12px;color:#7a7a7a;margin-bottom:16px;">Type your name as it appears on your invitation.</div>
          <input id="nameInput" type="text" autocomplete="off" autocorrect="off" spellcheck="false"
            placeholder="e.g. Tony Siew"
            value="${prefill || ''}"
            style="width:100%;padding:13px 14px;font-family:'DM Sans',sans-serif;font-size:15px;border:1.5px solid #e0dbd4;border-radius:10px;background:#faf8f4;color:#2c2c2c;outline:none;transition:border-color 0.15s;"
            oninput="handleInput()"
            onkeydown="if(event.key==='Enter')handleSearch()">
          <div id="matchList" style="display:none;"></div>
          <div id="noMatchMsg" style="display:none;font-size:12px;color:#c0392b;margin-top:10px;padding:10px 12px;background:#fdf0ee;border-radius:8px;">
            No guest found. Please check your spelling or ask a member of staff for help.
          </div>
        </div>
        <button onclick="handleSearch()" style="width:100%;padding:16px;background:#7a8c78;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;color:white;cursor:pointer;transition:opacity 0.15s;" onmouseover="this.style.opacity=0.88" onmouseout="this.style.opacity=1">
          Find my seat →
        </button>
      </div>`;

    const input = document.getElementById('nameInput');
    input.focus();
    input.style.borderColor = '#e0dbd4';
    setTimeout(() => { input.setSelectionRange(input.value.length, input.value.length); }, 0);

    window.handleInput = function() {
      document.getElementById('matchList').style.display = 'none';
      document.getElementById('noMatchMsg').style.display = 'none';
      input.style.borderColor = '#e0dbd4';
    };

    window.handleSearch = function() {
      const q = document.getElementById('nameInput').value.trim();
      if (!q) return;
      const exact = guestData.find(g => g.name.toLowerCase() === q.toLowerCase());
      if (exact) {
        resolvedGuest = exact;
        renderConfirm();
        return;
      }
      const matches = findMatches(q);
      if (matches.length > 0) {
        showMatchList(matches);
      } else {
        document.getElementById('noMatchMsg').style.display = 'block';
        input.style.borderColor = '#e05858';
      }
    };

    window.acceptSuggestion = function(name, table) {
      resolvedGuest = { name, table };
      renderConfirm();
    };
  }

  function showMatchList(matches) {
    const box = document.getElementById('matchList');
    box.style.cssText = 'display:block;margin-top:14px;border:1.5px solid #c8d4c6;border-radius:12px;overflow:hidden;';
    box.innerHTML =
      `<div style="background:#eef2ed;padding:8px 14px;font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#7a8c78;">Select your name</div>` +
      matches.map(g => {
        const isVip = g.table === 'VIP 1';
        const initials = g.name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
        const safeName = g.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        const safeTable = g.table.replace(/'/g,"\\'");
        return `<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid #f5f3f0;">
          <div style="width:36px;height:36px;border-radius:50%;background:${isVip ? '#e8d5b0' : '#c8d4c6'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:${isVip ? '#b8935a' : '#7a8c78'};flex-shrink:0;">${initials}</div>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:500;color:#2c2c2c;">${g.name}</div>
            <div style="font-size:11px;color:#7a7a7a;margin-top:1px;">Table ${g.table}</div>
          </div>
          <button onclick="acceptSuggestion('${safeName}','${safeTable}')" style="padding:7px 14px;background:#7a8c78;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:white;cursor:pointer;flex-shrink:0;">That's me</button>
        </div>`;
      }).join('') +
      `<div style="padding:10px 14px;background:#faf9f7;">
        <button onclick="document.getElementById('matchList').style.display='none';document.getElementById('nameInput').focus();" style="background:none;border:none;font-family:'DM Sans',sans-serif;font-size:12px;color:#7a7a7a;cursor:pointer;padding:0;">None of these — try again</button>
      </div>`;
  }

  // ── SCREEN 1: Confirm ────────────────────────────────────────────────────────
  function renderConfirm() {
    const { name: guestName, table: tableId } = resolvedGuest;
    const tablemates = guestData.filter(g => g.table === tableId && g.name !== guestName);
    const isVip = tableId === 'VIP 1';
    const alreadyIn = arrivedGuests.has(tableId + '|' + guestName);
    const initials = guestName.split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');

    overlay.innerHTML = `
      <div style="width:100%;max-width:420px;padding:0 20px;">
        ${eventHeader}
        <div style="background:white;border:1px solid #e8e4de;border-radius:16px;padding:24px;margin-bottom:16px;text-align:center;">
          <div style="width:56px;height:56px;border-radius:50%;background:${isVip ? '#e8d5b0' : '#c8d4c6'};display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:18px;font-weight:500;color:${isVip ? '#b8935a' : '#7a8c78'};">${initials}</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;color:#2c2c2c;margin-bottom:4px;">${guestName}</div>
          ${isVip ? `<div style="display:inline-block;background:#e8d5b0;color:#b8935a;font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;padding:3px 10px;border-radius:10px;margin:4px 0 10px;">VIP Table</div>` : ''}
          <div style="font-size:13px;color:#7a7a7a;margin-top:10px;">Your seat is at</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:500;color:#2c2c2c;line-height:1.1;">Table ${tableId}</div>
        </div>

        <div style="background:white;border:1px solid #e8e4de;border-radius:16px;padding:20px;margin-bottom:20px;">
          <div style="font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#7a7a7a;margin-bottom:14px;">Your tablemates</div>
          ${tablemates.length === 0
            ? `<div style="font-size:13px;color:#aaa;text-align:center;">No other guests at this table</div>`
            : tablemates.map(t => `
              <div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #f5f3f0;">
                <div style="width:28px;height:28px;border-radius:50%;background:#eef2ed;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:#7a8c78;flex-shrink:0;">${t.name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('')}</div>
                <div style="font-size:13px;color:#2c2c2c;">${t.name}</div>
              </div>`).join('')}
        </div>

        <button onclick="goBack()" style="width:100%;padding:12px;background:none;border:1.5px solid #e0dbd4;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:13px;color:#7a7a7a;cursor:pointer;margin-bottom:10px;">← Not me, search again</button>

        ${alreadyIn
          ? `<div style="text-align:center;padding:16px;background:#eef2ed;border-radius:12px;color:#7a8c78;font-size:14px;font-weight:500;">You are already checked in ✓</div>
             <button onclick="doShowTableView()" style="margin-top:10px;width:100%;padding:16px;background:white;border:1.5px solid #c8d4c6;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;color:#7a8c78;cursor:pointer;">View your table →</button>`
          : `<button id="checkinBtn" onclick="doCheckin()" style="width:100%;padding:18px;background:#7a8c78;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:500;color:white;cursor:pointer;transition:opacity 0.2s;" onmouseover="this.style.opacity=0.88" onmouseout="this.style.opacity=1">Check me in</button>`}
      </div>`;

    window.goBack = () => renderSearch(guestName);
    window.doCheckin = doCheckin;
    window.doShowTableView = () => showTableView(guestName, tableId);
  }

  // ── SCREEN 2: Success ────────────────────────────────────────────────────────
  function doCheckin() {
    const { name: guestName, table: tableId } = resolvedGuest;
    const btn = document.getElementById('checkinBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Checking in…'; btn.style.opacity = '0.7'; }
    arrivedGuests.add(tableId + '|' + guestName);
    setTimeout(() => renderSuccess(guestName, tableId), 600);
  }

  function renderSuccess(guestName, tableId) {
    overlay.innerHTML = `
      <div style="width:100%;max-width:420px;padding:0 20px;">
        <div style="text-align:center;padding:80px 0 40px;">
          <div style="width:80px;height:80px;border-radius:50%;background:#eef2ed;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
              <path d="M8 18L15 25L28 11" stroke="#7a8c78" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <animate attributeName="stroke-dashoffset" from="40" to="0" dur="0.5s" begin="0.2s" fill="freeze"/>
              </path>
            </svg>
          </div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:#2c2c2c;margin-bottom:8px;">You're checked in!</div>
          <div style="font-size:14px;color:#7a7a7a;">Welcome, ${guestName.split(' ')[0]}.</div>
          <div style="font-size:14px;color:#7a7a7a;margin-top:4px;">Enjoy the celebration.</div>
        </div>
        <div style="background:white;border:1px solid #e8e4de;border-radius:16px;padding:20px;text-align:center;margin-bottom:24px;">
          <div style="font-size:12px;color:#7a7a7a;margin-bottom:4px;">Your table</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:500;color:#2c2c2c;">Table ${tableId}</div>
        </div>
        <button onclick="doShowTableView()" style="width:100%;padding:16px;background:white;border:1.5px solid #c8d4c6;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;color:#7a8c78;cursor:pointer;">View your table →</button>
      </div>
      <style>@keyframes popIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}</style>`;

    window.doShowTableView = () => showTableView(guestName, tableId);
    setTimeout(() => showTableView(guestName, tableId), 2400);
  }

  // ── SCREEN 3: Table view ─────────────────────────────────────────────────────
  function showTableView(guestName, tableId) {
    const tbl = tables.find(t => t.id === tableId);
    const tablemates = guestData.filter(g => g.table === tableId && g.name !== guestName);
    const isVip = tableId === 'VIP 1';

    overlay.innerHTML = `
      <div style="width:100%;max-width:420px;padding:0 20px;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:20px 0 16px;">
          <div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:400;color:#2c2c2c;">Your Table</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:13px;color:#7a7a7a;font-style:italic;">Table ${tableId}</div>
        </div>

        <div style="background:white;border:1px solid #e8e4de;border-radius:16px;overflow:hidden;margin-bottom:16px;padding:12px;">
          <div style="font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#7a7a7a;margin-bottom:8px;text-align:center;">Grand Ballroom</div>
          <svg viewBox="0 0 580 860" width="100%" style="display:block;border-radius:8px;background:#f5f3f0;">
            <rect x="16" y="90" width="548" height="732" fill="white" stroke="#c8c2b8" stroke-width="2"/>
            <rect x="190" y="100" width="200" height="36" rx="4" fill="#d4cfc8" stroke="#b0aa9f" stroke-width="1"/>
            <text x="290" y="122" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#6a6560">STAGE</text>
            ${tables.map(t => {
              const hi = t.id === tableId;
              const fill = hi ? '#7a8c78' : (t.type === 'vip' ? '#e8b84b' : '#4db8a0');
              return `<circle cx="${t.cx}" cy="${t.cy}" r="${hi ? 28 : 20}" fill="${fill}" opacity="${hi ? 1 : 0.3}"/>
                <text x="${t.cx}" y="${t.cy}" text-anchor="middle" dominant-baseline="central" font-family="DM Sans,sans-serif" font-size="${hi ? 13 : 10}" font-weight="500" fill="white">${t.id === 'VIP 1' ? 'VIP' : t.id}</text>`;
            }).join('')}
            ${tbl ? `<circle cx="${tbl.cx}" cy="${tbl.cy}" r="38" fill="none" stroke="#7a8c78" stroke-width="2">
              <animate attributeName="r" values="32;46;32" dur="2s" repeatCount="indefinite"/>
              <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite"/>
            </circle>` : ''}
          </svg>
        </div>

        <div style="background:white;border:1px solid #e8e4de;border-radius:16px;padding:20px;margin-bottom:16px;">
          <div style="display:flex;align-items:center;gap:12px;padding-bottom:14px;border-bottom:1px solid #f5f3f0;margin-bottom:14px;">
            <div style="width:40px;height:40px;border-radius:50%;background:${isVip ? '#e8d5b0' : '#c8d4c6'};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:${isVip ? '#b8935a' : '#7a8c78'};flex-shrink:0;">
              ${guestName.split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('')}
            </div>
            <div>
              <div style="font-size:14px;font-weight:500;color:#2c2c2c;">${guestName}</div>
              <div style="font-size:11px;color:#7a7a7a;margin-top:2px;">Checked in ✓</div>
            </div>
          </div>
          <div style="font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#7a7a7a;margin-bottom:12px;">Tablemates</div>
          ${tablemates.map(t => `
            <div style="display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid #f5f3f0;">
              <div style="width:26px;height:26px;border-radius:50%;background:#eef2ed;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;color:#7a8c78;flex-shrink:0;">${t.name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('')}</div>
              <div style="font-size:13px;color:#2c2c2c;">${t.name}</div>
            </div>`).join('')}
        </div>

        <!-- Deregister -->
        <div id="deregisterSection" style="margin-bottom:16px;">
          <button onclick="expandDeregister()" style="width:100%;padding:13px 16px;background:#fdf5f4;border:1.5px solid #f5c0b8;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:#c0392b;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;"><circle cx="8" cy="8" r="7" stroke="#c0392b" stroke-width="1.5"/><path d="M8 5v3.5" stroke="#c0392b" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="11" r="0.75" fill="#c0392b"/></svg>
            Checked in by mistake?
          </button>
        </div>

        <div style="text-align:center;font-size:12px;color:#aaa;padding-bottom:32px;">Enjoy the celebration 🎊</div>
      </div>`;

    window.expandDeregister = function() {
      const sec = document.getElementById('deregisterSection');
      sec.innerHTML = `
        <div style="border:1.5px solid #f5c0b8;border-radius:12px;overflow:hidden;">
          <div style="background:#fdf5f4;padding:14px 16px;border-bottom:1px solid #f5c0b8;">
            <div style="font-size:13px;font-weight:500;color:#c0392b;margin-bottom:4px;">Undo check-in for ${guestName}?</div>
            <div style="font-size:12px;color:#7a7a7a;line-height:1.5;">This will remove your check-in and bring you back to the name search. Use this only if you checked in using the wrong name.</div>
          </div>
          <div style="display:flex;">
            <button onclick="expandDeregister=null;document.getElementById('deregisterSection').innerHTML='<button onclick=\\'expandDeregister()\\' style=\\'width:100%;padding:12px;background:none;border:1px solid #e8e4de;border-radius:12px;font-family:DM Sans,sans-serif;font-size:13px;color:#aaa;cursor:pointer;\\'>Checked in by mistake?</button>';" style="flex:1;padding:12px;background:white;border:none;border-right:1px solid #f5c0b8;font-family:'DM Sans',sans-serif;font-size:13px;color:#7a7a7a;cursor:pointer;">Cancel</button>
            <button onclick="doDeregister('${guestName.replace(/'/g,"\\'")}','${tableId.replace(/'/g,"\\'")}')" style="flex:1;padding:12px;background:#e74c3c;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:white;cursor:pointer;">Yes, undo check-in</button>
          </div>
        </div>`;
    };

    window.doDeregister = function(name, table) {
      arrivedGuests.delete(table + '|' + name);
      resolvedGuest = null;
      renderSearch(name);
    };
  }

  // Boot
  renderSearch();
})();
</script>
</body>
</html>
