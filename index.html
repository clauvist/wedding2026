<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Check-in UI — Tristan & Regina</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="components/mock-data.jsx"></script>
<script type="text/babel" src="components/admin-desktop.jsx"></script>
<script type="text/babel" src="components/admin-mobile.jsx"></script>
<script type="text/babel" src="components/guest-checkin.jsx"></script>
<script type="text/babel">

const TWEAK_DEFAULTS = {
  "accentColor": "#7a8c78",
  "goldColor": "#b8935a",
  "fontSerif": "Cormorant Garamond",
  "fontSans": "DM Sans",
  "showVIPBadge": true,
  "denseList": false
};

function App() {
  const [tweaks, setTweakState] = React.useState(TWEAK_DEFAULTS);

  return (
    <DesignCanvas>

      {/* ── Row 1: Admin Desktop ── */}
      <DCSection id="admin-desktop" title="Admin — Desktop">
        <DCArtboard id="admin-desktop-full" label="Full dashboard" width={1280} height={800}>
          <AdminDesktop tweaks={tweaks} />
        </DCArtboard>
      </DCSection>

      {/* ── Row 2: Admin Mobile ── */}
      <DCSection id="admin-mobile" title="Admin — Mobile">
        <DCArtboard id="admin-mobile-overview" label="Overview tab" width={390} height={844}>
          <AdminMobile tweaks={tweaks} initialTab="overview" />
        </DCArtboard>
        <DCArtboard id="admin-mobile-guests" label="Guest list tab" width={390} height={844}>
          <AdminMobile tweaks={tweaks} initialTab="guests" />
        </DCArtboard>
        <DCArtboard id="admin-mobile-search" label="Search active" width={390} height={844}>
          <AdminMobile tweaks={tweaks} initialTab="guests" initialSearch="Chen" />
        </DCArtboard>
        <DCArtboard id="admin-mobile-qr" label="QR Code tab" width={390} height={844}>
          <AdminMobile tweaks={tweaks} initialTab="qr" />
        </DCArtboard>
      </DCSection>

      {/* ── Row 3: Guest Self Check-in ── */}
      <DCSection id="guest-checkin" title="Guest Self Check-in — Mobile">
        <DCArtboard id="guest-pin" label="1 · PIN entry" width={390} height={844}>
          <GuestCheckin tweaks={tweaks} screen="pin" />
        </DCArtboard>
        <DCArtboard id="guest-search" label="2 · Name search" width={390} height={844}>
          <GuestCheckin tweaks={tweaks} screen="search" />
        </DCArtboard>
        <DCArtboard id="guest-matches" label="3 · Confirm identity" width={390} height={844}>
          <GuestCheckin tweaks={tweaks} screen="confirm" />
        </DCArtboard>
        <DCArtboard id="guest-success" label="4 · Checked in!" width={390} height={844}>
          <GuestCheckin tweaks={tweaks} screen="success" />
        </DCArtboard>
        <DCArtboard id="guest-table" label="5 · Table view" width={390} height={844}>
          <GuestCheckin tweaks={tweaks} screen="table" />
        </DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
