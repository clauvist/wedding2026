<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx" data-resource-id="designCanvas"></script>
<script type="text/babel" src="ios-frame.jsx" data-resource-id="iosFrame"></script>
<script type="text/babel" src="components/mock-data.jsx" data-resource-id="mockData"></script>
<script type="text/babel" src="components/admin-desktop.jsx" data-resource-id="adminDesktop"></script>
<script type="text/babel" src="components/admin-mobile.jsx" data-resource-id="adminMobile"></script>
<script type="text/babel" src="components/guest-checkin.jsx" data-resource-id="guestCheckin"></script>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#7a8c78",
  "goldColor": "#b8935a",
  "fontSerif": "Cormorant Garamond",
  "fontSans": "DM Sans",
  "showVIPBadge": true,
  "denseList": false
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweakState] = React.useState(TWEAK_DEFAULTS);
  const setTweak = (key, val) => {
    const next = typeof key === 'object' ? {...tweaks,...key} : {...tweaks,[key]:val};
    setTweakState(next);
    window.parent?.postMessage({type:'__edit_mode_set_keys', edits: next},'*');
  };
  const [showTweaks, setShowTweaks] = React.useState(false);

  React.useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    });
    window.parent?.postMessage({type:'__edit_mode_available'},'*');
  }, []);

  return (
    <DesignCanvas>

      {/* ── Row 1: Admin Desktop ── */}
      <DCSection id="admin-desktop" title="Admin — Desktop">
        <DCArtboard id="admin-desktop-full" label="Full dashboard" width={1280} height={800}>
          <AdminDesktop tweaks={tweaks} />
        </DCArtboard>
      </DCSection>

      {/* ── Row 2: Admin Mobile ── */}
      <DCSection id="admin-mobile" title="Admin — Mobile">
        <DCArtboard id="admin-mobile-overview" label="Overview tab" width={390} height={844}>
          <AdminMobile tweaks={tweaks} initialTab="overview" />
        </DCArtboard>
        <DCArtboard id="admin-mobile-guests" label="Guest list tab" width={390} height={844}>
          <AdminMobile tweaks={tweaks} initialTab="guests" />
        </DCArtboard>
        <DCArtboard id="admin-mobile-search" label="Search active" width={390} height={844}>
          <AdminMobile tweaks={tweaks} initialTab="guests" initialSearch="Chen" />
        </DCArtboard>
        <DCArtboard id="admin-mobile-qr" label="QR Code tab" width={390} height={844}>
          <AdminMobile tweaks={tweaks} initialTab="qr" />
        </DCArtboard>
      </DCSection>

      {/* ── Row 3: Guest Self Check-in ── */}
      <DCSection id="guest-checkin" title="Guest Self Check-in — Mobile">
        <DCArtboard id="guest-pin" label="1 · PIN entry" width={390} height={844}>
          <GuestCheckin tweaks={tweaks} screen="pin" />
        </DCArtboard>
        <DCArtboard id="guest-search" label="2 · Name search" width={390} height={844}>
          <GuestCheckin tweaks={tweaks} screen="search" />
        </DCArtboard>
        <DCArtboard id="guest-matches" label="3 · Confirm identity" width={390} height={844}>
          <GuestCheckin tweaks={tweaks} screen="confirm" />
        </DCArtboard>
        <DCArtboard id="guest-success" label="4 · Checked in!" width={390} height={844}>
          <GuestCheckin tweaks={tweaks} screen="success" />
        </DCArtboard>
        <DCArtboard id="guest-table" label="5 · Table view" width={390} height={844}>
          <GuestCheckin tweaks={tweaks} screen="table" />
        </DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
